<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ТАНКИ 360</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #222; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; font-size: 20px; }
        #joy { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; }
    </style>
</head>
<body>
    <div id="ui">HP: <span id="hp">100</span></div>
    <canvas id="game"></canvas>
    <div id="joy"></div>

    <script>
        const socket = io();
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {};
        let bullets = [];
        let myId = null;

        socket.on('connect', () => { myId = socket.id; });

        socket.on('updatePlayers', (data) => {
            for (let id in data) {
                if (id !== myId) players[id] = data[id]; // Чужих обновляем полностью
                else if (players[myId]) players[myId].hp = data[id].hp; // У себя только HP
                else players[myId] = data[id];
            }
            for (let id in players) if (!data[id]) delete players[id];
        });

        socket.on('bullet', (b) => { bullets.push({...b, dist: 0}); });

        function handleShoot(targetX, targetY) {
            if (!myId || !players[myId]) return;
            const p = players[myId];
            // Вычисляем угол полета пули в сторону клика
            const angle = Math.atan2(targetY - p.y, targetX - p.x);
            socket.emit('shoot', { angle: angle });
        }

        // Стрельба мышкой на ПК
        window.addEventListener('mousedown', (e) => { handleShoot(e.clientX, e.clientY); });

        // Стрельба тапом на телефоне
        window.addEventListener('touchstart', (e) => {
            if (e.target.tagName !== 'CANVAS') return;
            handleShoot(e.touches[0].clientX, e.touches[0].clientY);
        });

        function move(dx, dy) {
            if (!myId || !players[myId]) return;
            const p = players[myId];
            p.x += dx; p.y += dy;
            socket.emit('move', { x: p.x, y: p.y, angle: p.angle });
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Пули
            bullets.forEach((b, i) => {
                b.x += Math.cos(b.angle) * 10;
                b.y += Math.sin(b.angle) * 10;
                b.dist++;
                ctx.fillStyle = "yellow";
                ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();

                if (b.owner === myId) {
                    for (let id in players) {
                        if (id !== myId && Math.hypot(b.x - players[id].x, b.y - players[id].y) < 25) {
                            socket.emit('hit', id);
                            bullets.splice(i, 1);
                        }
                    }
                }
                if (b.dist > 100) bullets.splice(i, 1);
            });

            // Танки
            for (let id in players) {
                let p = players[id];
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.fillStyle = "red"; ctx.fillRect(-20, -35, 40, 5);
                ctx.fillStyle = "#0f0"; ctx.fillRect(-20, -35, (p.hp/100)*40, 5);
                ctx.rotate(p.angle);
                ctx.fillStyle = p.color;
                ctx.fillRect(-15, -15, 30, 30);
                ctx.fillStyle = "black"; ctx.fillRect(10, -3, 15, 6);
                ctx.restore();
            }
            requestAnimationFrame(loop);
        }
        loop();

        // Управление клавиатурой
        const keys = {};
        window.onkeydown = (e) => keys[e.key] = true;
        window.onkeyup = (e) => keys[e.key] = false;
        setInterval(() => {
            if (keys['w']) move(0, -4); if (keys['s']) move(0, 4);
            if (keys['a']) move(-4, 0); if (keys['d']) move(4, 0);
        }, 20);

        // Джойстик для телефона
        if ('ontouchstart' in window) {
            nipplejs.create({ zone: document.getElementById('joy'), mode: 'static', position: {left: '70px', bottom: '70px'}, color: 'white' })
            .on('move', (e, d) => move(Math.cos(d.angle.radian)*4, -Math.sin(d.angle.radian)*4));
        }
    </script>
</body>
</html>
