<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Танковый Бой</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #444; margin: auto; border: 5px solid #333; }
        #joy { position: absolute; bottom: 50px; left: 50px; width: 150px; height: 150px; }
        #info { position: absolute; top: 10px; left: 10px; color: white; }
    </style>
</head>
<body>
    <div id="info">а георгий педарас</div>
    <canvas id="game"></canvas>
    <div id="joy"></div>

    <script>
        const socket = io();
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth < 800 ? window.innerWidth : 800;
        canvas.height = window.innerHeight < 600 ? window.innerHeight : 600;

        let players = {};
        let myId = null;
        let myPos = { x: 100, y: 100, angle: 0, color: 'lime' };

        socket.on('connect', () => { myId = socket.id; });
        socket.on('updatePlayers', (data) => { 
            players = data; 
            if (myId && players[myId]) myPos = players[myId];
        });

        // Отрисовка танка
        function drawTank(p) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);
            
            // Корпус
            ctx.fillStyle = p.color;
            ctx.fillRect(-15, -15, 30, 30);
            ctx.strokeRect(-15, -15, 30, 30);
            
            // Дуло
            ctx.fillStyle = "black";
            ctx.fillRect(0, -3, 25, 6);
            ctx.restore();
        }

        // Движение
        function move(dx, dy, angle) {
            myPos.x += dx;
            myPos.y += dy;
            myPos.angle = angle;
            socket.emit('move', myPos);
        }

        // Цикл игры
        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let id in players) {
                drawTank(players[id]);
            }
            requestAnimationFrame(update);
        }
        update();

        // ПК управление
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w') move(0, -4, -Math.PI/2);
            if (e.key === 'ArrowDown' || e.key === 's') move(0, 4, Math.PI/2);
            if (e.key === 'ArrowLeft' || e.key === 'a') move(-4, 0, Math.PI);
            if (e.key === 'ArrowRight' || e.key === 'd') move(4, 0, 0);
        });

        // Джойстик для телефона
        const manager = nipplejs.create({ zone: document.getElementById('joy'), mode: 'static', position: {left: '75px', top: '75px'}, color: 'white' });
        manager.on('move', (evt, data) => {
            const dx = Math.cos(data.angle.radian) * 4;
            const dy = -Math.sin(data.angle.radian) * 4;
            move(dx, dy, -data.angle.radian);
        });
    </script>
</body>
</html>
