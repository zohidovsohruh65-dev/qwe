<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Танки: Фикс</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; }
        canvas { display: block; background: #222; }
        #ui { position: fixed; top: 10px; left: 10px; color: #fff; font: 20px Arial; pointer-events: none; z-index: 10; }
        #joy { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">HP: <span id="hp">100</span></div>
    <canvas id="game"></canvas>
    <div id="joy"></div>

    <script>
        const socket = io();
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {};
        let bullets = [];
        let myId = null;
        let mouseX = 0, mouseY = 0;

        socket.on('connect', () => { myId = socket.id; });
        
        socket.on('updatePlayers', (data) => {
            for (let id in data) {
                if (id !== myId) {
                    if (!players[id]) players[id] = data[id];
                    else {
                        players[id].targetX = data[id].x;
                        players[id].targetY = data[id].y;
                        players[id].angle = data[id].angle;
                        players[id].turretAngle = data[id].turretAngle;
                        players[id].hp = data[id].hp;
                    }
                } else {
                    if (!players[myId]) players[myId] = data[id];
                    players[myId].hp = data[id].hp;
                }
            }
            for (let id in players) if (!data[id]) delete players[id];
        });

        socket.on('bullet', b => bullets.push({...b, d: 0}));

        window.onmousemove = e => { mouseX = e.clientX; mouseY = e.clientY; };
        
        window.onmousedown = () => {
            if (!players[myId]) return;
            const p = players[myId];
            const ang = Math.atan2(mouseY - p.y, mouseX - p.x);
            socket.emit('shoot', { x: p.x + Math.cos(ang)*30, y: p.y + Math.sin(ang)*30, angle: ang });
        };

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!myId || !players[myId]) return requestAnimationFrame(loop);

            const me = players[myId];
            me.turretAngle = Math.atan2(mouseY - me.y, mouseX - me.x);

            // Пули
            bullets.forEach((b, i) => {
                b.x += Math.cos(b.angle) * 12;
                b.y += Math.sin(b.angle) * 12;
                b.d++;
                ctx.fillStyle = "#ff0";
                ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
                if (b.owner === myId) {
                    for (let id in players) if (id !== myId && Math.hypot(b.x-players[id].x, b.y-players[id].y) < 25) {
                        socket.emit('hit', id); bullets.splice(i, 1);
                    }
                }
                if (b.d > 80) bullets.splice(i, 1);
            });

            // Танки
            for (let id in players) {
                let p = players[id];
                if (id !== myId && p.targetX !== undefined) {
                    p.x += (p.targetX - p.x) * 0.2;
                    p.y += (p.targetY - p.y) * 0.2;
                }

                ctx.save();
                ctx.translate(p.x, p.y);
                // HP
                ctx.fillStyle = "red"; ctx.fillRect(-20, -40, 40, 4);
                ctx.fillStyle = "#0f0"; ctx.fillRect(-20, -40, (p.hp/100)*40, 4);
                // Корпус
                ctx.rotate(p.angle);
                ctx.fillStyle = p.color; ctx.fillRect(-15, -15, 30, 30);
                ctx.restore();
                // Башня
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.turretAngle);
                ctx.fillStyle = "#000"; ctx.fillRect(0, -2, 25, 4);
                ctx.restore();
            }
            document.getElementById('hp').innerText = me.hp;
            requestAnimationFrame(loop);
        }
        loop();

        const keys = {};
        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;
        
        setInterval(() => {
            if (!players[myId]) return;
            let moved = false;
            let p = players[myId];
            let speed = 5;

            if (keys['w'] || keys['ц'] || keys['arrowup']) { p.y -= speed; p.angle = -Math.PI/2; moved = true; }
            if (keys['s'] || keys['ы'] || keys['arrowdown']) { p.y += speed; p.angle = Math.PI/2; moved = true; }
            if (keys['a'] || keys['ф'] || keys['arrowleft']) { p.x -= speed; p.angle = Math.PI; moved = true; }
            if (keys['d'] || keys['в'] || keys['arrowright']) { p.x += speed; p.angle = 0; moved = true; }
            
            if (moved) {
                socket.emit('move', { x: p.x, y: p.y, angle: p.angle, turretAngle: p.turretAngle });
            }
        }, 30);

        if ('ontouchstart' in window) {
            nipplejs.create({ zone: document.getElementById('joy'), mode: 'static', position: {left: '70px', bottom: '70px'}, color: 'white' })
            .on('move', (e, d) => {
                let p = players[myId];
                p.x += Math.cos(d.angle.radian)*5;
                p.y -= Math.sin(d.angle.radian)*5;
                p.angle = -d.angle.radian;
                socket.emit('move', { x: p.x, y: p.y, angle: p.angle, turretAngle: p.turretAngle });
            });
        }
    </script>
</body>
</html>
